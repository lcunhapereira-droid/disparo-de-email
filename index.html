<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumina Social | Gerenciador de Redes Sociais</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0F1117" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              'heading': ['Space Grotesk', 'sans-serif'],
              'sans': ['Inter', 'sans-serif'],
            },
            colors: {
              'app-bg': '#0F1117',
              'app-card': '#1A1D27',
              'app-card2': '#1E2235',
              'app-border': '#2D3148',
              'app-border2': '#363A5C',
              'app-muted': '#6B7280',
              'app-text': '#E2E8F0',
              'app-text2': '#94A3B8',
              'accent': '#6366F1',
              'accent-hover': '#4F52D9',
              'accent-light': '#818CF8',
              'success': '#10B981',
              'warning': '#F59E0B',
              'danger': '#EF4444',
              'instagram': '#E1306C',
              'tiktok': '#69C9D0',
              'youtube': '#FF0000',
            },
            animation: {
              'fade-in': 'fadeIn 0.3s ease-in-out',
              'slide-up': 'slideUp 0.3s ease-out',
            },
            keyframes: {
              fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
              slideUp: { '0%': { opacity: '0', transform: 'translateY(12px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            },
          }
        }
      }
    </script>
    <style>
      body { font-family: 'Inter', sans-serif; background-color: #0F1117; }
      h1, h2, h3, h4, h5, h6 { font-family: 'Space Grotesk', sans-serif; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #1A1D27; }
      ::-webkit-scrollbar-thumb { background: #2D3148; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #363A5C; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.29.0",
    "vite": "https://aistudiocdn.com/vite@^7.2.2",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.0"
  }
}
</script>
</head>
  <body class="bg-app-bg text-app-text">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
